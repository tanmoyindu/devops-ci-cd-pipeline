name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Start app
        run: node app.js &

      - name: Wait for app
        run: sleep 5

      - name: Run tests
        run: node test.js

      - name: Build Docker image
        run: docker build -t devops-app .
